<!-- Content Canvas -->
<main class="flex-grow flex items-center justify-center p-6 md:p-12 relative z-0">
<!-- Ghost border ambient element -->
<div class="absolute inset-0 border-[0.5px] border-outline-variant/15 pointer-events-none m-8 md:m-16 rounded-xl hidden md:block"></div>
<div class="max-w-2xl w-full flex flex-col items-center text-center space-y-12">

<span class="font-headline text-2xl tracking-[0.2em] uppercase text-primary">BARTOOLS</span>
<div class="w-8 h-[1px] bg-primary/30"></div>
</div>

<h1 class="font-headline text-5xl md:text-7xl font-light tracking-wide text-on-background">
                    Reports Workbench
                </h1>
<p class="font-body text-lg md:text-xl text-on-surface-variant font-light max-w-lg mx-auto">
                    Open recent reports and inspect records from desktop.
                </p>
</div>
<!-- Primary Action -->
<div class="pt-8 flex flex-col items-center gap-6">
<button class="bg-copper-gradient text-on-primary-container font-label text-sm uppercase tracking-wider py-4 px-10 rounded-sm hover:opacity-90 transition-opacity duration-300 flex items-center gap-3">
<span>Open Reports</span>

</button>
