<div class="w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] rounded-full bg-primary/10 blur-[120px]"></div>
</div>

<p class="font-label text-sm uppercase tracking-[0.05em] text-primary">BARBACK</p>
<h1 class="font-headline text-5xl md:text-6xl font-medium tracking-tight text-on-surface leading-tight">

                </h1>
</header>
<div class="w-16 h-px bg-outline-variant/30"></div>
<p class="font-body text-lg text-on-surface-variant max-w-lg leading-relaxed">

            </p>

<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed px-10 py-4 rounded-sm font-label text-sm tracking-[0.05em] uppercase hover:brightness-110 transition-all duration-300 shadow-[0_12px_40px_rgba(0,0,0,0.6),0_0_4px_rgba(184,115,51,0.05)]">

</div>

<p class="font-label text-xs tracking-widest uppercase text-outline-variant">

                </p>
</footer>
