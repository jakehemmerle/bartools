[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/dashboard/Dockerfile"
watchPatterns = [
  "/package.json",
  "/bun.lock",
  "/tsconfig.base.json",
  "/packages/dashboard/**",
  "/packages/types/**",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
